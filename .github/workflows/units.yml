name: units-grabber
run-name: ${{ github.workflow }} ✅ ${{ github.event_name }}
on:
  workflow_call:
    outputs:
      units_outcome:
        description: "jobs.push.outputs.output_units"
        value: ${{ jobs.push.outputs.output_units }}
  workflow_dispatch:

jobs:
  grab:
    runs-on: ubuntu-latest
    timeout-minutes: 80
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        include:
          - unit: unit1
          - unit: unit2
          # - unit: unit3
          - unit: unit4
          - unit: unit5
          - unit: unit6

    defaults:
      run:
        working-directory: ./epg-grabber

    # OPRAVA: Mapovanie výstupov z matice (využívame internal GitHub matrix syntax)
    outputs:
      unit1_scale: ${{ steps.save_outputs.outputs.unit1_sum_outcome }}
      unit2_scale: ${{ steps.save_outputs.outputs.unit2_sum_outcome }}
      # unit3_scale: ${{ steps.save_outputs.outputs.unit3_sum_outcome }}
      unit4_scale: ${{ steps.save_outputs.outputs.unit4_sum_outcome }}
      unit5_scale: ${{ steps.save_outputs.outputs.unit5_sum_outcome }}
      unit6_scale: ${{ steps.save_outputs.outputs.unit6_sum_outcome }}
      unit1: ${{ steps.save_outputs.outputs.unit1_outcome }}
      unit2: ${{ steps.save_outputs.outputs.unit2_outcome }}
      # unit3: ${{ steps.save_outputs.outputs.unit3_outcome }}
      unit4: ${{ steps.save_outputs.outputs.unit4_outcome }}
      unit5: ${{ steps.save_outputs.outputs.unit5_outcome }}
      unit6: ${{ steps.save_outputs.outputs.unit6_outcome }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # OPRAVA: Opravená syntax podmienky (spojené do jedného výrazu)
      - name: localle
        uses: milankomaj/shell-x@v0.3
        if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
        with:
          shell: bash
          locale: sk_SK.utf8
          timezone: Europe/Bratislava

      - name: NpmInstall
        id: NpmInstall
        run: npm install

      - name: Grab
        if: steps.NpmInstall.outcome == 'success'
        id: grab_unit
        run: |
          npm run ${{ matrix.unit }}

      - name: outcome
        id: unit_outcome
        shell: bash
        run: |
          echo ${{ matrix.unit }} - ${{ steps.grab_unit.outcome }}
          scale=$(sed -n '$=' ./guide/${{ matrix.unit }}.guide.xml)
          if [[ "$scale" -ge "18" ]]
          then
            echo "✅ : ${{ matrix.unit }} - $scale"
            echo "scale=$scale" >> $GITHUB_OUTPUT
            echo "grab_outcome=${{ steps.grab_unit.outcome }}" >> $GITHUB_OUTPUT
          else
            echo "❌ : ${{ matrix.unit }} - $scale"
            exit 1
          fi


      - name: Save Outputs for Job
        id: save_outputs
        run: |
          echo "${{ matrix.unit }}_sum_outcome=${{ steps.unit_outcome.outputs.scale }}" >> $GITHUB_OUTPUT
          echo "${{ matrix.unit }}_outcome=${{ steps.unit_outcome.outputs.grab_outcome }}" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        id: upload
        if: steps.grab_unit.outcome == 'success' && steps.unit_outcome.outcome == 'success'
        with:
          name: units_${{ matrix.unit }}
          if-no-files-found: error
          path: |
            ${{ github.workspace }}/epg-grabber/guide/${{ matrix.unit }}.guide.xml
          retention-days: 5

      - run: echo "${{ steps.upload.outputs.artifact-id }} - ${{ steps.upload.outputs.artifact-url }}"

  push:
    runs-on: ubuntu-latest
    if: ${{ success() }}
    needs: [grab]
    outputs:
      output_units: ${{ steps.deploy.outputs.units_outcome }}

    steps:
     # Artifacts download
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
           epg-grabber/scripts/combine-xml.sh
          sparse-checkout-cone-mode: false

      - uses: actions/download-artifact@v5
        id: download
        with:
          path: ${{ github.workspace }}/epg-grabber/guide/
          merge-multiple: true
          pattern: units_*

      - name: 'download && path && combine'
        working-directory: ./epg-grabber
        id: combine
        run: |
          echo "Unit 1: ${{ needs.grab.outputs.unit1 }}"
          echo "Unit 2: ${{ needs.grab.outputs.unit2 }}"
          # echo "Unit 3: ${{ needs.grab.outputs.unit3 }}"
          echo "Unit 4: ${{ needs.grab.outputs.unit4 }}"
          echo "Unit 5: ${{ needs.grab.outputs.unit5 }}"
          echo "Unit 6: ${{ needs.grab.outputs.unit6 }}"
          echo "Path: ${{ steps.download.outputs.download-path }}"
          tree -h ${{ steps.download.outputs.download-path }}
          chmod +x ./scripts/combine-xml.sh
          ./scripts/combine-xml.sh
          tree -h ${{ steps.download.outputs.download-path }}
          scale=$(sed -n '$=' ./guide/units.guide.xml)

          # Pôvodná matematika sčítania rozmerov z jobu grab
          sum=$(( ${{ needs.grab.outputs.unit1_scale }} + ${{ needs.grab.outputs.unit2_scale }} + ${{ needs.grab.outputs.unit4_scale }} + ${{ needs.grab.outputs.unit5_scale }} + ${{ needs.grab.outputs.unit6_scale }} - 8 ))
          if [[ $sum -eq $scale ]]
          then
            echo "✅ Equal"
          else
            echo "❌ Not equal (Očakávané: $sum, Skutočné: $scale)"
            exit 1
          fi


      - uses: actions/upload-artifact@v4
        id: units
        if: steps.combine.outcome == 'success'
        with:
          name: units
          if-no-files-found: error
          path: |
            ${{ github.workspace }}/epg-grabber/guide/units.guide.xml
          retention-days: 5

      - run: echo "${{ steps.units.outputs.artifact-id }} - ${{ steps.units.outputs.artifact-url }}"